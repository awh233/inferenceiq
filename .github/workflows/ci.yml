name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --exit-zero
        continue-on-error: true

      - name: Python syntax check
        run: |
          python -m py_compile server/*.py api/**/*.py engine/**/*.py

      - name: Install SDK dependencies
        run: |
          pip install build

      - name: Build Python SDK
        run: |
          cd sdk/python
          python -m build
          ls -lh dist/

      - name: Start server in dev mode
        env:
          IQ_DEV_MODE: 'true'
        run: |
          python -m uvicorn server.app:app --host 0.0.0.0 --port 8000 &
          echo "Server PID: $!"
          sleep 2

      - name: Wait for server to be ready
        timeout-minutes: 2
        run: |
          python << 'EOF'
          import time
          import httpx

          max_retries = 30
          retry_delay = 1
          base_url = "http://localhost:8000"

          for attempt in range(max_retries):
              try:
                  response = httpx.get(f"{base_url}/v1/health", timeout=5)
                  if response.status_code == 200:
                      print(f"✅ Server is ready! (attempt {attempt + 1})")
                      break
              except Exception as e:
                  print(f"⏳ Waiting for server... (attempt {attempt + 1}/{max_retries})")
                  if attempt == max_retries - 1:
                      print(f"❌ Server failed to start: {e}")
                      exit(1)
              time.sleep(retry_delay)
          EOF

      - name: Run integration tests
        env:
          IQ_TEST_URL: 'http://localhost:8000'
          IQ_VERBOSE: 'false'
        run: |
          python test_integration.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *.log
            test_output/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          pkill -f "uvicorn server.app" || true
          sleep 1

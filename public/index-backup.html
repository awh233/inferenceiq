/* ═══════════════════════════════════════════════════════════════════════
   DATA GENERATORS
   ═══════════════════════════════════════════════════════════════════════ */
const seed = s => { let v = s; return () => { v = (v * 16807) % 2147483647; return (v - 1) / 2147483646; }; };
const pick = (arr, r) => arr[Math.floor(r() * arr.length)];
const fmt = n => n >= 1e6 ? (n / 1e6).toFixed(1) + "M" : n >= 1e3 ? (n / 1e3).toFixed(1) + "K" : n.toFixed ? n.toFixed(0) : String(n);
const fmtD = n => "$" + fmt(n);
const fmtP = n => n.toFixed(1) + "%";
const fmtMs = n => n < 1000 ? n.toFixed(0) + "ms" : (n / 1000).toFixed(2) + "s";

function genTimeSeries(days, s = 42) {
  const r = seed(s), pts = [], now = Date.now(); let cum = 0;
  for (let i = days; i >= 0; i--) {
    const d = new Date(now - i * 864e5), base = 2400 + r() * 1800, saved = base * (0.28 + r() * 0.18);
    cum += saved;
    pts.push({
      date: d.toLocaleDateString("en-US", { month: "short", day: "numeric" }),
      fullDate: d.toISOString().slice(0, 10),
      cost: Math.round(base), optimized: Math.round(base - saved), saved: Math.round(saved),
      cumSaved: Math.round(cum), requests: Math.floor(18000 + r() * 30000),
      cacheHits: Math.floor(9000 + r() * 15000), cacheMisses: Math.floor(5000 + r() * 10000),
      p50: Math.round(60 + r() * 80), p95: Math.round(180 + r() * 120), p99: Math.round(400 + r() * 200),
      tps: Math.round(350 + r() * 200), errRate: +(r() * 1.5).toFixed(2),
      qualityScore: +(92 + r() * 7).toFixed(1),
    });
  }
  return pts;
}

function genLedger(count = 100) {
  const r = seed(42), rows = [];
  for (let i = 0; i < count; i++) {
    const prov = pick(PROVIDERS, r), orig = 8 + r() * 50, sav = orig * (0.12 + r() * 0.4);
    rows.push({
      id: `INF-${(10000 + i).toString(36).toUpperCase()}`, time: new Date(Date.now() - r() * 864e5 * 7).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }),
      provider: prov, model: pick(MODELS[prov], r), routed: pick(MODELS[pick(PROVIDERS, r)], r),
      opt: pick(OPTS, r), team: pick(TEAMS, r), region: pick(REGIONS, r),
      tokIn: Math.floor(200 + r() * 3000), tokOut: Math.floor(50 + r() * 800),
      cost: orig, saved: sav, quality: Math.floor(80 + r() * 20),
      ttft: Math.floor(30 + r() * 350), tps: Math.floor(40 + r() * 150),
      status: r() > 0.06 ? "success" : r() > 0.5 ? "degraded" : "error",
      cached: r() > 0.4,
    });
  }
  return rows;
}

function genModels() {
  const r = seed(42), out = [];
  PROVIDERS.forEach(p => MODELS[p].forEach(m => {
    out.push({
      name: m, provider: p, reqs: Math.floor(20000 + r() * 180000),
      cost: Math.round(2000 + r() * 15000), saved: Math.round(800 + r() * 8000),
      ttft: Math.round(40 + r() * 250), tps: Math.round(40 + r() * 160),
      err: (r() * 2.5).toFixed(2), availability: (99 + r()).toFixed(2),
      qualityAvg: (88 + r() * 11).toFixed(1),
    });
  }));
  return out;
}

function genTeams() {
  const r = seed(42);
  return TEAMS.map(t => {
    const o = 15000 + r() * 40000, s = o * (0.2 + r() * 0.28);
    return {
      name: t, reqs: Math.floor(50000 + r() * 300000), orig: Math.round(o),
      actual: Math.round(o - s), saved: Math.round(s), budget: Math.round(o * 1.15),
      members: Math.floor(3 + r() * 20), topModel: pick(Object.values(MODELS).flat(), r),
    };
  });
}

function genAlerts() {
  const r = seed(77);
  const types = ["cost_spike", "latency_p99", "error_rate", "cache_miss", "model_degraded", "budget_warning"];
  const severities = ["critical", "warning", "info"];
  return Array.from({ length: 20 }, (_, i) => ({
    id: `ALT-${1000 + i}`, type: pick(types, r), severity: pick(severities, r),
    message: [
      "Cost spike detected: +34% above baseline for gpt-4o",
      "P99 latency exceeded 500ms threshold on claude-sonnet-4-5",
      "Error rate above 2% on gemini-2.0-flash in us-west-2",
      "Cache hit rate dropped below 50% for ML Research team",
      "Model llama-3.1-70b degraded: quality score below 85%",
      "Platform Eng team at 92% of monthly budget",
      "Batch shift queue depth exceeding 10K requests",
      "Token pruning savings below expected 15% threshold",
      "New model version available: gpt-4o-2026-03",
      "API rate limit approaching for Anthropic provider",
    ][Math.floor(r() * 10)],
    time: new Date(Date.now() - r() * 864e5 * 3).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }),
    acknowledged: r() > 0.6,
  }));
}

function genAuditLog() {
  const r = seed(55);

  const users = ["drew@inferenceiq.com", "sarah@inferenceiq.com", "mike@inferenceiq.com", "system"];
  return Array.from({ length: 30 }, (_, i) => ({
    id: `AUD-${2000 + i}`, action: pick(actions, r), user: pick(users, r),
    detail: "Configuration change applied successfully",
    time: new Date(Date.now() - r() * 864e5 * 14).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }),
    ip: `${Math.floor(r() * 200 + 10)}.${Math.floor(r() * 255)}.${Math.floor(r() * 255)}.${Math.floor(r() * 255)}`,
  }));
}

  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 14px", boxShadow: "0 1px 3px rgba(60,64,67,.3), 0 4px 8px 3px rgba(60,64,67,.15)", fontFamily: FONT }}>

      {payload.map((p, i) => (
        <p key={i} style={{ fontSize: 12, margin: "2px 0", color: p.color, fontWeight: 500 }}>{p.name}: {typeof p.value === "number" && p.value > 100 ? fmtD(p.value) : p.value}</p>
      ))}
    </div>
  );
};

function LedgerView() {
  const [search, setSearch] = useState("");
  const [page, setPage] = useState(0);
  const rows = useMemo(() => genLedger(200), []);
  const filtered = rows.filter(r => !search || JSON.stringify(r).toLowerCase().includes(search.toLowerCase()));
  const pageSize = 25;
  const paged = filtered.slice(page * pageSize, (page + 1) * pageSize);
  const totalSaved = rows.reduce((s, r) => s + r.saved, 0);

  const columns = [
    { key: "id", label: "ID", bold: true },
    { key: "time", label: "Timestamp" },
    { key: "provider", label: "Provider", render: v => <ProviderBadge name={v} /> },
    { key: "model", label: "Model" },
    { key: "routed", label: "Routed" },
    { key: "opt", label: "Optimization", render: v => <StatusChip status="info" label={v} /> },
    { key: "team", label: "Team" },
    { key: "cost", label: "Cost", align: "right", mono: true, render: v => "$" + v.toFixed(2) },
    { key: "saved", label: "Saved", align: "right", mono: true, render: v => <span style={{ color: C.green, fontWeight: 500 }}>-${v.toFixed(2)}</span> },
    { key: "quality", label: "Quality", align: "right", render: v => <span style={{ color: v >= 95 ? C.green : v >= 85 ? C.blue : C.amber }}>{v}%</span> },
    { key: "status", label: "Status", render: v => <StatusChip status={v} /> },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
        <MetricCard label="Total Entries" value={rows.length.toString()} icon={FileText} mini />
        <MetricCard label="Total Saved" value={"$" + Math.round(totalSaved)} icon={DollarSign} color={C.green} mini />
        <MetricCard label="Avg / Request" value={"$" + (totalSaved / rows.length).toFixed(2)} icon={TrendingUp} mini />
        <MetricCard label="Avg Quality" value={fmtP(rows.reduce((s, r) => s + r.quality, 0) / rows.length)} icon={Check} color={C.blue} mini />
      </div>

      <Section title="Request-Level Savings Ledger" desc="Immutable, cryptographically signed" actions={
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ position: "relative" }}>
            <Search size={14} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.textTertiary }} />
            <input value={search} onChange={e => { setSearch(e.target.value); setPage(0); }} placeholder="Filter..." style={{ width: 200, padding: "7px 12px 7px 32px", borderRadius: 20, border: `1px solid ${C.border}`, fontSize: 13, outline: "none", background: "#f8f9fa", fontFamily: FONT }} onFocus={e => { e.target.style.borderColor = C.blue; e.target.style.background = "#fff"; }} onBlur={e => { e.target.style.borderColor = C.border; e.target.style.background = "#f8f9fa"; }} />
          </div>
          <IconBtn icon={Download} tooltip="Export" />
        </div>
      }>
        <Table columns={columns} data={paged} maxH={420} footer={
          <><span>Showing {page * pageSize + 1}–{Math.min((page + 1) * pageSize, filtered.length)} of {filtered.length}</span>
            <div style={{ display: "flex", gap: 4 }}>
              <button disabled={page === 0} onClick={() => setPage(p => p - 1)} style={{ padding: "4px 12px", borderRadius: 4, border: `1px solid ${C.border}`, background: C.surface, cursor: page === 0 ? "default" : "pointer", fontSize: 12, opacity: page === 0 ? 0.4 : 1 }}>Previous</button>
              <button disabled={(page + 1) * pageSize >= filtered.length} onClick={() => setPage(p => p + 1)} style={{ padding: "4px 12px", borderRadius: 4, border: `1px solid ${C.border}`, background: C.surface, cursor: "pointer", fontSize: 12, opacity: (page + 1) * pageSize >= filtered.length ? 0.4 : 1 }}>Next</button>
            </div></>
        } />
      </Section>
    </div>
  );
}

                  <span style={{ color: pct > 90 ? C.red : pct > 70 ? C.amber : C.green, fontWeight: 500 }}>{pct.toFixed(0)}%</span>
                </div>
                <ProgressBar value={t.actual} max={t.budget} color={pct > 90 ? C.red : pct > 70 ? C.amber : C.blue} />
              </div>
            ); })}
          </div>
        </ChartCard>
      </div>
      <Section title="Team Cost Allocation" actions={<IconBtn icon={Download} tooltip="Export" />}><Table columns={columns} data={teams} /></Section>
    </div>
  );
}

function AlertsView() {
  const alerts = useMemo(() => genAlerts(), []);
  const [filter, setFilter] = useState("all");
  const filtered = alerts.filter(a => filter === "all" || a.severity === filter);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
        <MetricCard label="Total Alerts" value={alerts.length.toString()} icon={Bell} mini />
        <MetricCard label="Critical" value={alerts.filter(a => a.severity === "critical").length.toString()} icon={AlertCircle} color={C.red} mini />
        <MetricCard label="Warnings" value={alerts.filter(a => a.severity === "warning").length.toString()} icon={AlertTriangle} color={C.amber} mini />
        <MetricCard label="Acknowledged" value={alerts.filter(a => a.acknowledged).length.toString()} icon={CheckCircle} color={C.green} mini />
      </div>

      <Section title="Alert Feed" desc="Real-time anomaly detection" actions={
        <div style={{ display: "flex", gap: 6 }}>{["all", "critical", "warning", "info"].map(f => <Pill key={f} label={f.charAt(0).toUpperCase() + f.slice(1)} active={filter === f} onClick={() => setFilter(f)} />)}</div>
      }>
        <div style={{ maxHeight: 500, overflowY: "auto" }}>
          {filtered.map(a => (
            <div key={a.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "14px 20px", borderBottom: `1px solid ${C.borderLight}`, transition: "background 0.1s" }}
              onMouseEnter={e => e.currentTarget.style.background = "#f8f9fa"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <StatusChip status={a.severity} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: C.textPrimary }}>{a.message}</div>
                <div style={{ fontSize: 12, color: C.textTertiary, marginTop: 2 }}>{a.id} · {a.time}</div>
              </div>
              {a.acknowledged ? <StatusChip status="success" label="Ack'd" /> : <Button variant="outlined" small>Acknowledge</Button>}
            </div>
          ))}
        </div>
      </Section>
    </div>
  );
}

function MonitoringView() {

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
        <MetricCard label="Uptime (30d)" value="99.97%" icon={MonitorDot} color={C.green} mini />
        <MetricCard label="Active Incidents" value={incidents.filter(i => i.status !== "resolved").length.toString()} icon={AlertCircle} color={incidents.filter(i => i.status !== "resolved").length > 0 ? C.amber : C.green} mini />
        <MetricCard label="MTTR" value="38m" icon={Timer} mini />
        <MetricCard label="SLA Status" value="Compliant" icon={ShieldCheck} color={C.green} mini />
      </div>

      <ChartCard title="Platform Health — Last 7 Days" height={200}>
        <ResponsiveContainer><AreaChart data={ts} margin={{ top: 5, right: 10, bottom: 0, left: 0 }}>
          <defs><linearGradient id="gHealth" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.green} stopOpacity={0.1} /><stop offset="95%" stopColor={C.green} stopOpacity={0} /></linearGradient></defs>
          <CartesianGrid stroke="#f1f3f4" vertical={false} /><XAxis dataKey="date" tick={{ fill: C.textSecondary, fontSize: 11 }} tickLine={false} axisLine={{ stroke: C.borderLight }} />

          <Tooltip content={<GTooltip />} /><Area type="monotone" dataKey="qualityScore" name="Uptime" stroke={C.green} fill="url(#gHealth)" strokeWidth={2} dot={false} />
        </AreaChart></ResponsiveContainer>
      </ChartCard>

      <Section title="Incidents">
        {incidents.map(inc => (
          <div key={inc.id} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "16px 20px", borderBottom: `1px solid ${C.borderLight}` }}>
            <StatusChip status={inc.status} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: C.textPrimary }}>{inc.title}</div>
              <div style={{ fontSize: 12, color: C.textSecondary, marginTop: 2 }}>Started {inc.started} · Duration: {inc.duration} · {inc.impact}</div>

}

function AuditView() {
  const logs = useMemo(() => genAuditLog(), []);
  const columns = [
    { key: "id", label: "ID", bold: true },
    { key: "time", label: "Timestamp" },
    { key: "user", label: "User", render: v => <span style={{ fontFamily: MONO, fontSize: 12 }}>{v}</span> },

    { key: "detail", label: "Detail" },

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <Section title="Audit Log" desc="Complete history of all administrative actions" actions={<div style={{ display: "flex", gap: 8 }}><IconBtn icon={Filter} tooltip="Filter" /><IconBtn icon={Download} tooltip="Export" /></div>}>
        <Table columns={columns} data={logs} maxH={500} footer={<span>Showing {logs.length} entries · Retention: 365 days</span>} />

function PlaygroundView() {
  const [model, setModel] = useState("gpt-4o");
  const [response, setResponse] = useState(null);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, minHeight: 500 }}>
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "14px 20px", borderBottom: `1px solid ${C.borderLight}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 500 }}>Request</div>
            <select value={model} onChange={e => setModel(e.target.value)} style={{ padding: "5px 10px", borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 13, fontFamily: FONT }}>
              {Object.values(MODELS).flat().map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div style={{ flex: 1, padding: 16 }}>
            <textarea placeholder="Enter your prompt here..." style={{ width: "100%", height: "100%", border: "none", outline: "none", fontSize: 13, fontFamily: MONO, resize: "none", color: C.textPrimary, boxSizing: "border-box" }} defaultValue={'Explain the benefits of semantic caching for LLM inference optimization.'} />
          </div>
          <div style={{ padding: "12px 20px", borderTop: `1px solid ${C.borderLight}`, display: "flex", justifyContent: "flex-end" }}>
            <Button icon={Play} onClick={() => setResponse({ text: "Semantic caching provides several key benefits for LLM inference optimization:\n\n1. Reduced latency — Cache hits return responses in <10ms vs 200-500ms for model inference\n2. Lower cost — Cached responses avoid per-token charges entirely\n3. Consistency — Identical or similar queries return consistent results\n4. Throughput — Offloads traffic from rate-limited APIs", model: "gpt-4o-mini (routed)", saved: "$0.0034", ttft: "8ms", cached: true })}>Run</Button>
          </div>
        </div>

        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "14px 20px", borderBottom: `1px solid ${C.borderLight}`, fontSize: 14, fontWeight: 500 }}>Response</div>
          {response ? (
            <>
              <div style={{ flex: 1, padding: 16, fontSize: 13, fontFamily: MONO, lineHeight: 1.7, color: C.textPrimary, whiteSpace: "pre-wrap", overflowY: "auto" }}>{response.text}</div>
              <div style={{ padding: "12px 20px", borderTop: `1px solid ${C.borderLight}`, display: "flex", gap: 16, fontSize: 12, color: C.textSecondary }}>
                <span>Model: <b>{response.model}</b></span><span>TTFT: <b>{response.ttft}</b></span><span style={{ color: C.green }}>Saved: <b>{response.saved}</b></span>{response.cached && <StatusChip status="success" label="Cache hit" />}
              </div>
            </>
          ) : <EmptyState icon={Terminal} title="No response yet" desc="Enter a prompt and click Run to see the optimized response" />}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════
   MAIN APPLICATION
   ═══════════════════════════════════════════════════════════════════════ */
function InferenceIQDashboard() {
  const [screen, setScreen] = useState("landing");
  const [view, setView] = useState("overview");
  const [days, setDays] = useState(7);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  if (screen === "landing") return <LandingPage onLogin={() => setScreen("login")} />;
  if (screen === "login") return <LoginPage onLogin={() => setScreen("dash")} onBack={() => setScreen("landing")} />;

  const navSections = [
    { label: "DASHBOARD", items: [
      { id: "overview", label: "Overview", icon: LayoutDashboard },
      { id: "inference", label: "Inference", icon: Activity },
      { id: "ledger", label: "Savings Ledger", icon: FileText },
    ]},
    { label: "ANALYTICS", items: [
      { id: "models", label: "Models", icon: Cpu },
      { id: "teams", label: "Teams", icon: Users },
    ]},
    { label: "OPERATIONS", items: [
      { id: "alerts", label: "Alerts", icon: Bell },
      { id: "monitoring", label: "Monitoring", icon: MonitorDot },
      { id: "audit", label: "Audit Log", icon: ShieldCheck },
    ]},
    { label: "TOOLS", items: [
      { id: "playground", label: "API Playground", icon: Terminal },
    ]},
    { label: "ACCOUNT", items: [
      { id: "settings", label: "Settings", icon: Settings },
    ]},
  ];

  const titles = { overview: "Overview", inference: "Inference", ledger: "Savings Ledger", models: "Models", teams: "Teams", alerts: "Alerts", monitoring: "Monitoring", audit: "Audit Log", playground: "API Playground", settings: "Settings" };

  return (
    <div style={{ display: "flex", height: "100vh", background: C.bg, fontFamily: FONT, color: C.textPrimary, fontSize: 14, WebkitFontSmoothing: "antialiased" }}>
      {sidebarOpen && <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.4)", zIndex: 30 }} onClick={() => setSidebarOpen(false)} />}

      {/* Sidebar */}
      <nav style={{ width: 240, minWidth: 240, height: "100%", background: C.surface, borderRight: `1px solid ${C.borderLight}`, display: "flex", flexDirection: "column", position: sidebarOpen ? "fixed" : "relative", zIndex: sidebarOpen ? 40 : 1 }}>
        <div style={{ padding: "14px 16px", display: "flex", alignItems: "center", gap: 10, borderBottom: `1px solid ${C.borderLight}` }}>
          <div style={{ width: 30, height: 30, borderRadius: 8, background: `linear-gradient(135deg, ${C.blue}, ${C.green})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#fff" }}>IQ</div>
          <div><div style={{ fontSize: 14, fontWeight: 600, lineHeight: "18px" }}>InferenceIQ</div><div style={{ fontSize: 10, color: C.textTertiary }}>Console</div></div>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "6px 8px" }}>
          {navSections.map(sec => (
            <div key={sec.label} style={{ marginBottom: 4 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: C.textTertiary, letterSpacing: "0.08em", padding: "10px 8px 4px" }}>{sec.label}</div>
              {sec.items.map(item => {
                const active = view === item.id; const Icon = item.icon;
                return (
                  <button key={item.id} onClick={() => { setView(item.id); setSidebarOpen(false); }} style={{
                    width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "7px 12px", borderRadius: 20, border: "none",
                    background: active ? "#e8f0fe" : "transparent", color: active ? C.blue : C.textSecondary,
                    fontSize: 13, fontWeight: active ? 600 : 400, cursor: "pointer", textAlign: "left", transition: "all 0.15s",
                  }}
                  onMouseEnter={e => { if (!active) e.currentTarget.style.background = "#f1f3f4"; }}
                  onMouseLeave={e => { if (!active) e.currentTarget.style.background = active ? "#e8f0fe" : "transparent"; }}>
                    <Icon size={16} style={{ opacity: active ? 1 : 0.65 }} />{item.label}
                  </button>
                );
              })}
            </div>
          ))}
        </div>
        <div style={{ padding: "10px 16px", borderTop: `1px solid ${C.borderLight}`, display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: C.textSecondary }}>
          <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.green }} />All systems operational
        </div>
      </nav>

      {/* Main */}
      <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <header style={{ height: 52, minHeight: 52, background: C.surface, borderBottom: `1px solid ${C.borderLight}`, display: "flex", alignItems: "center", padding: "0 20px", gap: 12 }}>
          <Breadcrumb items={["InferenceIQ", titles[view]]} />
          <div style={{ flex: 1 }} />
          <div style={{ display: "flex", gap: 6 }}>{[["7d", 7], ["30d", 30], ["90d", 90]].map(([l, d]) => <Pill key={l} label={l} active={days === d} onClick={() => setDays(d)} />)}</div>
          <div style={{ width: 1, height: 24, background: C.borderLight }} />
          <IconBtn icon={Bell} tooltip="Notifications" /><IconBtn icon={HelpCircle} tooltip="Help" />
          <div style={{ width: 30, height: 30, borderRadius: "50%", background: `linear-gradient(135deg, ${C.blue}, ${C.green})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 600, color: "#fff", cursor: "pointer" }}>DH</div>
          <button onClick={() => setScreen("landing")} style={{ background: "none", border: "none", cursor: "pointer", color: C.textTertiary, fontSize: 12, display: "flex", alignItems: "center", gap: 4 }}><LogOut size={14} />Sign out</button>
        </header>

        <main style={{ flex: 1, overflowY: "auto", padding: 20 }}>
          <div style={{ maxWidth: 1400, margin: "0 auto" }}>
            {view === "overview" && <OverviewView days={days} />}
            {view === "inference" && <InferenceView days={days} />}
            {view === "ledger" && <LedgerView />}
            {view === "models" && <ModelsView />}
            {view === "teams" && <TeamsView />}
            {view === "alerts" && <AlertsView />}
            {view === "monitoring" && <MonitoringView />}
            {view === "audit" && <AuditView />}
            {view === "playground" && <PlaygroundView />}
            {view === "settings" && <SettingsView />}
          </div>
        </main>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(InferenceIQDashboard));
</script>
